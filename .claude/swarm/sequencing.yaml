# Order of fields per agent:
#   prerequisites: agents that must be in completed[] before this can run
#   week: target week per the roadmap
#   pod: pod name for grouping
#   parallel_safe_with: agents that don't conflict with this one (informational only — Arch A runs serially)
#   requires_human_gate: orchestrator must stop and ask before dispatching
#   max_turns: hard cap on agentic turns
#   notes: free text

agents:
  scene-architect-3d:
    prerequisites: [r3f-scaffolder]
    week: 1
    pod: Engine Foundation
    requires_human_gate: false
    max_turns: 30

  physics-engine-3d:
    prerequisites: [scene-architect-3d]
    week: 1
    pod: Engine Foundation
    requires_human_gate: false
    max_turns: 30

  asset-pipeline-3d:
    prerequisites: [scene-architect-3d]
    week: 1
    pod: Engine Foundation
    parallel_safe_with: [physics-engine-3d, input-controller-3d]
    requires_human_gate: false
    max_turns: 25

  input-controller-3d:
    prerequisites: [scene-architect-3d]
    week: 1
    pod: Engine Foundation
    parallel_safe_with: [physics-engine-3d, asset-pipeline-3d]
    requires_human_gate: false
    max_turns: 25

  screen-grid-architect:
    prerequisites: [physics-engine-3d, asset-pipeline-3d, input-controller-3d]
    week: 1
    pod: Screen-Grid Core
    requires_human_gate: true
    notes: "Coordinate system is load-bearing. Human reviews before screen-loader builds on it."
    max_turns: 25

  save-bridge:
    prerequisites: [screen-grid-architect]
    week: 1
    pod: Migration
    requires_human_gate: true
    notes: "Save schema is load-bearing. Moved earlier per review."
    max_turns: 30

  screen-loader:
    prerequisites: [screen-grid-architect]
    week: 1
    pod: Screen-Grid Core
    requires_human_gate: false
    max_turns: 30

  edge-detector:
    prerequisites: [screen-loader, physics-engine-3d]
    week: 1
    pod: Screen-Grid Core
    requires_human_gate: false
    max_turns: 25

  screen-transition-fx:
    prerequisites: [edge-detector]
    week: 1
    pod: Screen-Grid Core
    requires_human_gate: false
    max_turns: 20

  data-schema-keeper:
    prerequisites: []
    week: 1
    pod: Quality
    requires_human_gate: false
    notes: "Always-on. Validates receipts and data files. Can run any time."
    max_turns: 15

  code-quality-reviewer:
    prerequisites: []
    week: 1
    pod: Quality
    requires_human_gate: false
    notes: "Always-on. Auto-dispatched by the orchestrator after every worker that returns a non-blocked, non-failed receipt. Verdict (PASS/NEEDS_REVISION/FAIL) gates the worker's transition into completed[]. Exempt from reviewing itself and data-schema-keeper."
    max_turns: 8

  resource-auditor:
    prerequisites: []
    week: 1
    pod: Quality
    requires_human_gate: false
    notes: "On-demand. Snapshot audit of machine-resource usage — Electron/Node process tree (RAM/CPU/handles), GPU utilization, bundle size, dependency weight. Read-only; never edits app code. Run with the app open for full runtime data. Outputs a markdown report under .claude/swarm/reports/ plus a receipt. Not auto-dispatched — user requests it. Complementary to runtime-audit-system (which checks in-game data integrity) — this one watches machine resources."
    max_turns: 25

  phaser-hmr-bridge:
    prerequisites: []
    week: 1
    pod: Quality
    requires_human_gate: true
    notes: "On-demand. Closes the Vite-HMR-vs-Phaser-state gap: adds src/renderer/game/dev/phaserHmr.js helper and registers every scene under src/renderer/game/scenes/ for auto-swap on file edit. Wide blast radius (~15 scene files touched, all additive append-only blocks) — gated behind human approval before dispatch. Lean fix (window.__phaserGame in dev) is already in place at GameContainer.jsx so manual scene swap from DevTools console works without this agent."
    max_turns: 20

  bundle-splitter:
    prerequisites: [resource-auditor]
    week: 1
    pod: Quality
    requires_human_gate: false
    notes: "On-demand fix for resource-auditor's HIGH bundle-bloat finding. Adds manualChunks to vite.config.* to split phaser/three/drei/r3f/rapier into vendor chunks. Folds in the LOW dynamic-import fix in MCPAIAdapter.js. Touches only vite.config.* and MCPAIAdapter.js. Low blast — verifiable by re-running npm run build and comparing chunk sizes against the audit baseline."
    max_turns: 18

  audio-asset-cleanup:
    prerequisites: [resource-auditor]
    week: 1
    pod: Quality
    requires_human_gate: true
    notes: "On-demand fix for resource-auditor's HIGH audio-bloat finding (~32 MB). Triages audio assets (alt-mixes, .wav masters, orphans) and ARCHIVES them via git mv to public/audio/_archived/ rather than deleting — reversible by design. Updates audioManifest.js if any reference shifts. NEVER touches services/npcSpeech.js or data/npcProfiles.js (that's tts-* scope). Human gate because file moves can break the audio loader if a manifest reference is missed."
    max_turns: 22

  dep-overrides-housekeeping:
    prerequisites: [resource-auditor]
    week: 1
    pod: Quality
    parallel_safe_with: [bundle-splitter]
    requires_human_gate: true
    notes: "On-demand fix for resource-auditor's MED three.js duplication finding + LOW dedupe finding. Adds overrides:{three:$three} to package.json to force a single three version, then runs npm dedupe. Touches package.json + package-lock.json only. Human gate because lockfile changes affect every dev and CI; agent will revert and mark blocked if npm install or build fails after the override."
    max_turns: 18

  tts-voice-config:
    prerequisites: []
    week: 1
    pod: Audio & TTS
    requires_human_gate: false
    notes: "Legacy 2D game scope. Expands CHARACTER_GENDER in npcSpeech.js to all NPCs, sets Zuzu to system-default voice, fixes voiceschanged race condition, fills voicePreference fields in npcProfiles.js. Strictly scoped to services/npcSpeech.js and data/npcProfiles.js."
    max_turns: 25

  tts-dialog-integration:
    prerequisites: [tts-voice-config]
    week: 1
    pod: Audio & TTS
    requires_human_gate: false
    notes: "Legacy 2D game scope. Wires the voice config into GameContainer.jsx dialog TTS — fixes speaker→npcId mismatch and appends quiz answer choices to the spoken utterance (matching the physics-question pattern). Scope strictly limited to the dialog-TTS effect block; reviewer should flag any other GameContainer edits as CRITICAL scope violation."
    max_turns: 20

  # ── World & Discovery pod (legacy 2D game) ──────────────────────────────
  # Transforms WorldMapScene from a static menu of locations into a
  # terrain-based, fog-of-war, discovery-driven world. Civilization-style
  # progression. Pure 2D legacy game scope; nothing under src/renderer/game3d/.

  world-biome-classifier:
    prerequisites: []
    week: 2
    pod: World & Discovery
    requires_human_gate: false
    notes: "Pure data work in regions.js. Tags every region with a BIOME enum (DESERT/GRASSLAND/WATER/ROCK/MOUNTAIN/URBAN/UNKNOWN). Strictly additive; no field renames. Foundation for terrain rendering."
    max_turns: 20

  world-terrain-renderer:
    prerequisites: [world-biome-classifier]
    week: 2
    pod: World & Discovery
    requires_human_gate: false
    notes: "REWRITTEN spec (v2). DELETE the existing radial fillCircle blobs at WorldMapScene.js:240-280 and REPLACE with continuous tile/noise terrain (32 px tiles), strong biome palette, inter-region color blending, and elevation shading from a deterministic noise heightmap. Includes new utils/terrainNoise.js helper. The v1 spec produced concentric tan circles centered on nodes — that result is wrong and must be removed wholesale, not toggled."
    max_turns: 30

  world-path-renderer:
    prerequisites: [world-terrain-renderer]
    week: 2
    pod: World & Discovery
    requires_human_gate: false
    notes: "Replaces straight-line paths between regions with curved bezier paths whose color and stroke weight reflect the dominant biome on the segment. Skips WATER endpoints (can't walk on water). Read-only on terrain; rewrites only the path-rendering block in WorldMapScene."
    max_turns: 22

  world-landmarks:
    prerequisites: [world-terrain-renderer]
    week: 2
    pod: World & Discovery
    parallel_safe_with: [world-path-renderer]
    requires_human_gate: false
    notes: "Adds sparse procedural sprite scatter — cacti/rocks for desert, scrub for grassland, ridge lines for mountain. Deterministic placement using the same seed as terrain. Cap ~80 landmarks total. Procedural Phaser Graphics only (no image loading this cycle)."
    max_turns: 22

  world-map-polish:
    prerequisites: [world-terrain-renderer, world-path-renderer, world-landmarks]
    week: 2
    pod: World & Discovery
    requires_human_gate: false
    notes: "Final cosmetic pass. Anchor nodes into biome bases (dust patch / rocky base / etc.), DELETE the large translucent zone circles around nodes, dim inactive labels to 0.7 alpha, add camera-edge vignette. Cosmetic only — click handlers, transitions, unlock logic untouched."
    max_turns: 22

  world-discovery-state:
    prerequisites: []
    week: 2
    pod: World & Discovery
    parallel_safe_with: [world-biome-classifier, world-terrain-renderer]
    requires_human_gate: false
    notes: "New systems/discoverySystem.js — sparse Set-keyed grid, save/load integration via existing saveSystem (additive, no version bump unless required). Data-only this cycle; rendering owned by other agents."
    max_turns: 22

  world-fog-overlay:
    prerequisites: [world-terrain-renderer, world-discovery-state]
    week: 2
    pod: World & Discovery
    requires_human_gate: false
    notes: "Renders fog above terrain, below paths/nodes/labels in WorldMapScene. Solid black for never-seen tiles; redrawFog() callable on discovery state changes. Must not block node click handlers."
    max_turns: 22

  world-node-gating:
    prerequisites: [world-discovery-state]
    week: 2
    pod: World & Discovery
    requires_human_gate: false
    notes: "Hides region nodes + paths-between-nodes until both endpoints are discovered. Adds revealNode(id) with Back.easeOut tween + optional discover SFX + first-time narrative dialog event."
    max_turns: 25

  world-discovery-quests:
    prerequisites: [world-discovery-state]
    week: 2
    pod: World & Discovery
    requires_human_gate: false
    notes: "Cross-system glue. New discoveryUnlocks.js maps regionId → unlock specs. Wires onRegionDiscovered events into existing quest-system unlockQuest API. Read-only on quests.js; pending:true for any region without a matching existing quest."
    max_turns: 22

  runtime-audit-system:
    prerequisites: []
    week: 2
    pod: World & Discovery
    parallel_safe_with: [world-biome-classifier, world-terrain-renderer, world-discovery-state]
    requires_human_gate: false
    notes: "New systems/runtimeAudit.js — in-game cross-system invariant checker (quest givers exist, items exist, scenes registered, regions have biomes, discoveryUnlocks point to real quests). DEV-only call from GameContainer boot. Read-only observer; logs to console without blocking. Counterpart to dev-time code-quality-reviewer."
    max_turns: 22
