name: Deploy BikeBrowser to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        env:
          npm_config_ignore_scripts: true
        run: npm ci

      - name: Verify clean checkout
        run: |
          git diff --exit-code
          git diff --cached --exit-code

      - name: Build
        env:
          BUILD_TIMESTAMP: ${{ github.run_started_at }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          GIT_COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || github.workflow }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ee1487bd55e182796a8d7868fc979792
          command: >-
            pages deploy build
            --project-name=bikebrowser
            --branch=${{ github.ref_name }}
            --commit-hash=${{ github.sha }}
            --commit-message="GitHub Actions deploy ${{ github.sha }}"
            --commit-dirty=false
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
